<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- Pizza -->
  <symbol id="icon-pizza" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 11h.01"/>
    <path d="M11 15h.01"/>
    <path d="M16 16h.01"/>
    <path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"/>
